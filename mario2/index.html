<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ダッシュ冒険ランド</title>
<style>
  :root{ --ink:#2b3a67; --yellow:#FFD93D; }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent;
     -webkit-user-select:none; user-select:none; }
  html,body{ height:100%; overflow:hidden; background:#0e1630;
     font-family:-apple-system,"Hiragino Maru Gothic ProN",sans-serif; }
  #wrap{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas{ display:block; touch-action:none; }
  #hud{ position:absolute; top:max(12px,env(safe-area-inset-top)); left:0; right:0; text-align:center;
     color:#fff; font-weight:800; font-size:20px; pointer-events:none; text-shadow:0 2px 0 var(--ink); }

  /* 操作ボタン（必ずタッチ対応） */
  #pad{ position:absolute; left:0; right:0; bottom:max(16px,env(safe-area-inset-bottom));
     display:flex; justify-content:space-between; padding:0 18px; pointer-events:none; }
  .grp{ display:flex; gap:14px; pointer-events:auto; }
  .key{ width:74px; height:74px; border:none; border-radius:50%; font-size:34px; font-weight:900;
     color:var(--ink); background:rgba(255,255,255,.82); box-shadow:0 6px 0 rgba(43,58,103,.45);
     display:flex; align-items:center; justify-content:center; touch-action:none; }
  .key:active{ transform:translateY(4px); box-shadow:0 2px 0 rgba(43,58,103,.45); }
  #jump{ width:88px; height:88px; font-size:30px; background:var(--yellow); box-shadow:0 6px 0 #d9a800; }
  #jump:active{ box-shadow:0 2px 0 #d9a800; }

  #overlay{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center;
     justify-content:center; gap:18px; background:rgba(14,22,48,.6); color:#fff; text-align:center; padding:24px; }
  #overlay h1{ font-size:32px; line-height:1.35; }
  #overlay p{ font-size:16px; opacity:.95; line-height:1.8; }
  #btn{ font-size:24px; font-weight:900; padding:15px 38px; border:none; border-radius:999px;
     background:var(--yellow); color:var(--ink); box-shadow:0 6px 0 #d9a800; }
  #btn:active{ transform:translateY(4px); box-shadow:0 2px 0 #d9a800; }
  .hide{ display:none !important; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="hud"></div>

<div id="pad" class="hide">
  <div class="grp">
    <button class="key" id="left">◀</button>
    <button class="key" id="right">▶</button>
  </div>
  <div class="grp">
    <button class="key" id="jump">⤴</button>
  </div>
</div>

<div id="overlay">
  <h1 id="title">🍄 ダッシュ冒険ランド</h1>
  <p id="desc">◀▶ で うごく ／ ⤴ で ジャンプ<br>コインを あつめて すすもう！てきは うえから ふんづけて たおせる<br>さいごの ボス「クッパ」を 3かい ふんで たおすと ゴール！</p>
  <button id="btn">スタート</button>
</div>

<script>
"use strict";
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
const hud=document.getElementById('hud'), overlay=document.getElementById('overlay');
const title=document.getElementById('title'), desc=document.getElementById('desc'), btn=document.getElementById('btn');
const pad=document.getElementById('pad');

let W,H,dpr;
function resize(){
  dpr=window.devicePixelRatio||1;
  W=Math.min(window.innerWidth,480); H=window.innerHeight;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  cv.width=Math.round(W*dpr); cv.height=Math.round(H*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resize); resize();

const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const rand=(a,b)=>a+Math.random()*(b-a);
function shade(hex,amt){ const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  const f=v=>clamp(Math.round(v+(amt>0?(255-v)*amt:v*amt)),0,255);
  return '#'+((1<<24)+(f(r)<<16)+(f(g)<<8)+f(b)).toString(16).slice(1); }
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

// ===== パーティクル・画面ゆれ =====
let particles=[], shakeT=0, shakeMag=0;
function shake(m=7,d=0.22){ shakeMag=m; shakeT=d; }
function burst(x,y,color,n=12){ for(let i=0;i<n;i++){ const a=rand(0,7),s=rand(50,200);
  particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-60,life:rand(.4,.8),t:0,c:color,r:rand(2,5)}); } }
function confetti(n=50){ for(let i=0;i<n;i++) particles.push({x:rand(0,W),y:rand(-40,0),
  vx:rand(-40,40),vy:rand(70,180),life:rand(1.2,2.2),t:0,c:['#FF6B6B','#FFD93D','#6BCB77','#4D96FF'][i%4],r:rand(3,6)}); }
function updParticles(dt){ for(const p of particles){ p.t+=dt; p.vy+=560*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; }
  particles=particles.filter(p=>p.t<p.life); }
function drawParticles(camx){ for(const p of particles){ ctx.globalAlpha=Math.max(0,1-p.t/p.life);
  ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x-(p.world?camx:0),p.y,p.r,0,7); ctx.fill(); } ctx.globalAlpha=1; }

// ===== ステージ定義（タイル40px・ワールド座標） =====
const T=40;            // タイルサイズ
const GROUND_Y=()=>H-90; // 地面の上端（画面下から）
let plats=[], coins=[], foes=[], goalX=0, worldW=0;
let boss=null, fireballs=[], bossDefeated=false;

function buildLevel(){
  const gy=GROUND_Y();
  plats=[]; coins=[]; foes=[];
  // 地面を区間で作る（途中に落とし穴）
  const segs=[[0,18],[20,8],[31,12],[46,10],[58,14]]; // [開始タイル, 長さ]
  for(const [s,len] of segs){ plats.push({x:s*T, y:gy, w:len*T, h:H, ground:true}); }
  // 浮きブロック（足場）
  const blocks=[[6,3],[9,4],[14,5],[24,3],[27,4],[35,3],[38,4],[41,5],[49,4],[52,5]];
  for(const [tx,th] of blocks){ plats.push({x:tx*T, y:gy-th*T, w:2*T, h:T, ground:false}); }
  // コイン（足場の上・通り道）
  const cs=[6.4,9.4,14.5,15.5,21,22,24.4,27.4,35.4,38.4,41.5,42.5,47,49.4,52.5,53.5,60,61];
  for(const c of cs){ coins.push({x:c*T, y:gy-3.0*T, r:11, taken:false}); }
  // 地上のコインも少し
  for(const c of [3,4,5,16,17,32,33,59]) coins.push({x:c*T, y:gy-26, r:11, taken:false});
  // 敵（クリボー風）
  const fx=[12,21,28,40,50,57];
  for(const x of fx){ foes.push({x:x*T, y:gy-34, w:34, h:34, vx:-46, alive:true, sq:0}); }
  // クッパ（ゴール手前のボス）
  boss={ x:60*T, y:GROUND_Y()-72, w:66, h:72, vx:62, hp:3, maxhp:3,
         alive:true, hurt:0, fireT:1.6, range:[58*T, 64*T] };
  fireballs=[];
  goalX=66*T;
  worldW=69*T;
}

// ===== プレイヤー =====
let p, camx, lives, coinCnt, state='ready', invuln=0;
const GRAV=2100, MOVE=235, JUMP=760;
function resetPlayer(x){ p={x, y:GROUND_Y()-44, w:30, h:42, vx:0, vy:0, onGround:false, face:1, walkT:0}; }

function startGame(){
  buildLevel(); resetPlayer(2*T); camx=0; lives=3; coinCnt=0; invuln=0;
  bossDefeated=false;
  state='play'; overlay.classList.add('hide'); pad.classList.remove('hide');
}
function loseLife(){
  lives--; shake(); burst(p.x+p.w/2,p.y+p.h/2,'#FF6B6B',16);
  if(lives<=0){ endGame(false); }
  else { invuln=1.4; resetPlayer(Math.max(2*T, p.x-120)); p.vy=-300; }
}
function endGame(win){
  state=win?'win':'over'; pad.classList.add('hide'); overlay.classList.remove('hide');
  if(win){ confetti(); title.textContent='🎉 クッパを たおして クリア！'; desc.textContent='あつめたコイン '+coinCnt+'まい\nすごい！もういちど あそぶ？'; btn.textContent='もういちど'; }
  else{ title.textContent='💥 ゲームオーバー'; desc.textContent='あつめたコイン '+coinCnt+'まい\nもういちど ちょうせん！'; btn.textContent='もういちど'; }
}

// ===== 入力 =====
const keys={left:false,right:false};
let jumpQ=false;
function bindHold(id,on){ const el=document.getElementById(id);
  const set=v=>e=>{ e.preventDefault(); on(v); };
  el.addEventListener('pointerdown',set(true)); el.addEventListener('pointerup',set(false));
  el.addEventListener('pointercancel',set(false)); el.addEventListener('pointerleave',set(false));
}
bindHold('left', v=>keys.left=v);
bindHold('right',v=>keys.right=v);
document.getElementById('jump').addEventListener('pointerdown',e=>{ e.preventDefault(); jumpQ=true; });
window.addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA') keys.left=true;
  if(e.code==='ArrowRight'||e.code==='KeyD') keys.right=true;
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){ e.preventDefault();
    if(state==='play') jumpQ=true; else startGame(); }
});
window.addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA') keys.left=false;
  if(e.code==='ArrowRight'||e.code==='KeyD') keys.right=false;
});
btn.addEventListener('click',startGame);

// ===== 衝突（AABB） =====
function hit(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }

function update(dt){
  // 横移動
  const dir=(keys.right?1:0)-(keys.left?1:0);
  p.vx=dir*MOVE; if(dir!==0) p.face=dir;
  if(dir!==0&&p.onGround) p.walkT+=dt*10;
  // ジャンプ
  if(jumpQ){ if(p.onGround){ p.vy=-JUMP; p.onGround=false; burst(p.x+p.w/2,p.y+p.h,'#fff',6);} jumpQ=false; }
  p.vy+=GRAV*dt;

  // X方向移動＋解決
  p.x+=p.vx*dt;
  for(const pl of plats){ if(hit(p,pl)){
    if(p.vx>0) p.x=pl.x-p.w; else if(p.vx<0) p.x=pl.x+pl.w; p.vx=0; } }
  p.x=clamp(p.x,0,worldW-p.w);

  // Y方向移動＋解決
  p.onGround=false; p.y+=p.vy*dt;
  for(const pl of plats){ if(hit(p,pl)){
    if(p.vy>0){ p.y=pl.y-p.h; p.vy=0; p.onGround=true; }
    else if(p.vy<0){ p.y=pl.y+pl.h; p.vy=0; } } }

  // 落下死
  if(p.y>H+80){ loseLife(); return; }
  if(invuln>0) invuln-=dt;

  // コイン
  for(const c of coins){ if(c.taken) continue;
    if(p.x<c.x+c.r && p.x+p.w>c.x-c.r && p.y<c.y+c.r && p.y+p.h>c.y-c.r){
      c.taken=true; coinCnt++; burst(c.x,c.y,'#FFD93D',8); } }

  // 敵
  for(const f of foes){ if(!f.alive){ f.sq-=dt; continue; }
    f.x+=f.vx*dt;
    // 足場の端 or 壁で反転
    let support=false, wall=false;
    for(const pl of plats){
      if(f.x+f.w>pl.x && f.x<pl.x+pl.w && Math.abs((f.y+f.h)-pl.y)<6) support=true;
      if(f.y+f.h>pl.y+4 && f.y<pl.y+pl.h-4 && ((f.vx<0&&Math.abs(f.x-(pl.x+pl.w))<8)||(f.vx>0&&Math.abs((f.x+f.w)-pl.x)<8))) wall=true;
    }
    if(!support||wall) f.vx*=-1;
    // 重力（足場に乗せる）
    let fy=f.y+260*dt, landed=false;
    for(const pl of plats){ if(f.x+f.w>pl.x&&f.x<pl.x+pl.w&&fy+f.h>pl.y&&f.y+f.h<=pl.y+12){ fy=pl.y-f.h; landed=true; } }
    f.y=fy;
    // プレイヤーと接触
    if(hit(p,f)){
      const fromTop = p.vy>0 && (p.y+p.h - f.y) < 22;
      if(fromTop){ f.alive=false; f.sq=0.4; p.vy=-460; coinCnt++; burst(f.x+f.w/2,f.y,'#6BCB77',12); shake(4,.15); }
      else if(invuln<=0){ loseLife(); return; }
    }
  }

  // クッパ（ボス）
  if(boss && boss.alive){
    boss.x+=boss.vx*dt;
    if(boss.x<boss.range[0]){ boss.x=boss.range[0]; boss.vx=Math.abs(boss.vx); }
    if(boss.x+boss.w>boss.range[1]){ boss.x=boss.range[1]-boss.w; boss.vx=-Math.abs(boss.vx); }
    let by=boss.y+320*dt;
    for(const pl of plats){ if(boss.x+boss.w>pl.x&&boss.x<pl.x+pl.w&&by+boss.h>pl.y&&boss.y+boss.h<=pl.y+16){ by=pl.y-boss.h; } }
    boss.y=by;
    if(boss.hurt>0) boss.hurt-=dt;
    // 火の玉を吐く
    boss.fireT-=dt;
    if(boss.fireT<=0){ boss.fireT=rand(1.7,2.7);
      const d=(p.x<boss.x)?-1:1;
      fireballs.push({x:boss.x+boss.w/2, y:boss.y+boss.h*0.42, vx:d*210, vy:-150, r:11});
      burst(boss.x+(d<0?6:boss.w-6), boss.y+boss.h*0.42, '#FF6B6B',6);
    }
    // プレイヤーと接触
    if(hit(p,boss)){
      const fromTop = p.vy>0 && (p.y+p.h - boss.y) < 28;
      if(fromTop){
        if(boss.hurt<=0){ boss.hp--; boss.hurt=0.9; p.vy=-500; shake(8,.28);
          burst(p.x+p.w/2,boss.y,'#6BCB77',16);
          if(boss.hp<=0){ boss.alive=false; bossDefeated=true; coinCnt+=5;
            burst(boss.x+boss.w/2,boss.y+boss.h/2,'#FFD93D',30); shake(12,.5); }
        }
      } else if(invuln<=0){ loseLife(); return; }
    }
  }
  // 火の玉の移動と当たり
  for(const fb of fireballs){ fb.vy+=620*dt; fb.x+=fb.vx*dt; fb.y+=fb.vy*dt; }
  fireballs=fireballs.filter(fb=> fb.y<H+60 && fb.x>camx-80 && fb.x<camx+W+260);
  for(const fb of fireballs){
    if(invuln<=0 && p.x<fb.x+fb.r && p.x+p.w>fb.x-fb.r && p.y<fb.y+fb.r && p.y+p.h>fb.y-fb.r){
      loseLife(); return; }
  }

  // ゴール（クッパを倒すと旗が開く）
  if(bossDefeated && p.x+p.w>goalX+8){ endGame(true); }

  // カメラ
  const target=clamp(p.x+p.w/2-W*0.38, 0, worldW-W);
  camx+=(target-camx)*Math.min(1,dt*8);
}

// ===== 描画 =====
function drawBG(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#74c7ff'); g.addColorStop(.6,'#bfe9ff'); g.addColorStop(1,'#eaf7d6');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // 太陽
  ctx.fillStyle='#fff7b0'; ctx.beginPath(); ctx.arc(W*0.82,H*0.15,28,0,7); ctx.fill();
  // 雲（パララックス）
  ctx.fillStyle='rgba(255,255,255,.92)';
  for(let i=0;i<5;i++){ let cx=((i*260 - camx*0.3)%(W+260)+(W+260))%(W+260)-130, cy=70+i*30;
    ctx.beginPath(); ctx.arc(cx,cy,18,0,7); ctx.arc(cx+22,cy+6,26,0,7); ctx.arc(cx+50,cy,17,0,7);
    ctx.rect(cx,cy,50,18); ctx.fill(); }
  // 遠景の丘
  ctx.fillStyle='#9bd66f';
  for(let i=0;i<6;i++){ let hx=((i*220 - camx*0.5)%(worldW)+worldW)%(worldW) - camx*0; }
  for(let i=-1;i<worldW/220+1;i++){ let hx=i*220-camx*0.5; ctx.beginPath();
    ctx.arc(hx, GROUND_Y()+40, 90, Math.PI, 0); ctx.fill(); }
}
function drawPlat(pl){
  const x=pl.x-camx;
  if(x>W||x+pl.w<0) return;
  if(pl.ground){
    ctx.fillStyle='#8b5a2b'; ctx.fillRect(x,pl.y,pl.w,pl.h);
    ctx.fillStyle='#6BCB77'; ctx.fillRect(x,pl.y,pl.w,14);
    ctx.fillStyle=shade('#6BCB77',-0.15); for(let i=0;i<pl.w;i+=14){ ctx.fillRect(x+i,pl.y+12,7,4); }
  } else {
    roundRect(x,pl.y,pl.w,pl.h,7); ctx.fillStyle='#d99a3a'; ctx.fill();
    ctx.strokeStyle='#a36a1e'; ctx.lineWidth=3; ctx.stroke();
    ctx.fillStyle='#fff3cf'; ctx.font='bold 18px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('?', x+pl.w/2, pl.y+pl.h/2+1);
  }
}
function drawCoin(c){ if(c.taken) return; const x=c.x-camx; if(x>W+20||x<-20) return;
  const w=Math.abs(Math.cos(performance.now()/200))*c.r+3;
  ctx.fillStyle='#FFD93D'; ctx.strokeStyle='#d9a800'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.ellipse(x,c.y,w,c.r,0,0,7); ctx.fill(); ctx.stroke();
}
function drawFoe(f){ const x=f.x-camx; if(x>W+40||x+f.w<-40) return;
  if(!f.alive){ ctx.fillStyle='#8a6d3b'; ctx.fillRect(x,f.y+f.h-10,f.w,10); return; }
  // 体
  ctx.fillStyle='#a9622f'; roundRect(x,f.y,f.w,f.h,10); ctx.fill();
  ctx.fillStyle='#f2d2a8'; roundRect(x+5,f.y+f.h*0.55,f.w-10,f.h*0.42,6); ctx.fill();
  // 目
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x+f.w*0.34,f.y+f.h*0.4,5,0,7); ctx.arc(x+f.w*0.66,f.y+f.h*0.4,5,0,7); ctx.fill();
  ctx.fillStyle='#2b3a67'; const lk=f.vx<0?-1.5:1.5;
  ctx.beginPath(); ctx.arc(x+f.w*0.34+lk,f.y+f.h*0.4,2.4,0,7); ctx.arc(x+f.w*0.66+lk,f.y+f.h*0.4,2.4,0,7); ctx.fill();
  // 怒り眉
  ctx.strokeStyle='#5a3210'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(x+f.w*0.22,f.y+f.h*0.28); ctx.lineTo(x+f.w*0.44,f.y+f.h*0.36);
  ctx.moveTo(x+f.w*0.78,f.y+f.h*0.28); ctx.lineTo(x+f.w*0.56,f.y+f.h*0.36); ctx.stroke();
}
function drawBoss(){
  if(!boss||!boss.alive) return;
  const x=boss.x-camx, y=boss.y, w=boss.w, h=boss.h;
  if(x>W+80||x+w<-80) return;
  if(boss.hurt>0 && Math.floor(performance.now()/70)%2===0) return; // ダメージ点滅
  ctx.save(); ctx.translate(x+w/2,y+h/2); ctx.scale(boss.vx<0?-1:1,1); ctx.translate(-w/2,-h/2);
  // しっぽ
  ctx.fillStyle='#6BCB77'; ctx.beginPath(); ctx.moveTo(w*0.05,h*0.7); ctx.lineTo(-w*0.12,h*0.55); ctx.lineTo(w*0.1,h*0.85); ctx.fill();
  // 体（緑）
  ctx.fillStyle='#5fae5a'; roundRect(w*0.1,h*0.3,w*0.8,h*0.6,12); ctx.fill();
  // お腹（黄）
  ctx.fillStyle='#FFD93D'; roundRect(w*0.24,h*0.42,w*0.52,h*0.42,10); ctx.fill();
  ctx.strokeStyle='#d9a800'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(w*0.4,h*0.42); ctx.lineTo(w*0.4,h*0.84); ctx.moveTo(w*0.6,h*0.42); ctx.lineTo(w*0.6,h*0.84); ctx.stroke();
  // 甲羅のトゲ
  ctx.fillStyle='#fff';
  for(const tx of [0.2,0.45,0.7]){ ctx.beginPath(); ctx.moveTo(w*tx,h*0.3); ctx.lineTo(w*(tx+0.08),h*0.12); ctx.lineTo(w*(tx+0.16),h*0.3); ctx.fill(); }
  // 頭
  ctx.fillStyle='#7ec06a'; roundRect(w*0.5,h*0.04,w*0.46,h*0.34,10); ctx.fill();
  // 角
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.moveTo(w*0.55,h*0.06); ctx.lineTo(w*0.5,h*-0.08); ctx.lineTo(w*0.64,h*0.04); ctx.fill();
  ctx.beginPath(); ctx.moveTo(w*0.8,h*0.06); ctx.lineTo(w*0.86,h*-0.08); ctx.lineTo(w*0.9,h*0.06); ctx.fill();
  // 目
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(w*0.72,h*0.16,5,6,0,0,7); ctx.fill();
  ctx.fillStyle='#c0392b'; ctx.beginPath(); ctx.arc(w*0.74,h*0.17,2.6,0,7); ctx.fill();
  // 怒り眉
  ctx.strokeStyle='#3a5a2a'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(w*0.6,h*0.08); ctx.lineTo(w*0.78,h*0.14); ctx.stroke();
  // 口
  ctx.fillStyle='#3a2a1a'; roundRect(w*0.56,h*0.26,w*0.36,h*0.08,3); ctx.fill();
  ctx.fillStyle='#fff'; for(let i=0;i<3;i++){ ctx.beginPath();
    ctx.moveTo(w*(0.6+i*0.1),h*0.26); ctx.lineTo(w*(0.64+i*0.1),h*0.32); ctx.lineTo(w*(0.68+i*0.1),h*0.26); ctx.fill(); }
  ctx.restore();
  // HPバー（頭上・カメラ追従済み座標）
  const bw=66, bx=x+w/2-bw/2, byy=y-16;
  ctx.fillStyle='rgba(43,58,103,.5)'; roundRect(bx-2,byy-2,bw+4,12,4); ctx.fill();
  ctx.fillStyle='#FF6B6B'; roundRect(bx,byy,bw*(boss.hp/boss.maxhp),8,3); ctx.fill();
}
function drawFireball(fb){
  const x=fb.x-camx, y=fb.y; if(x>W+30||x<-30) return;
  const w=fb.r+Math.sin(performance.now()/60)*2;
  ctx.fillStyle='#FFB14D'; ctx.beginPath(); ctx.arc(x,y,w,0,7); ctx.fill();
  ctx.fillStyle='#FF6B6B'; ctx.beginPath(); ctx.arc(x,y,w*0.62,0,7); ctx.fill();
  ctx.fillStyle='#FFF3B0'; ctx.beginPath(); ctx.arc(x,y,w*0.3,0,7); ctx.fill();
}
function drawPlayer(){
  const x=p.x-camx, y=p.y, w=p.w, h=p.h;
  if(invuln>0 && Math.floor(performance.now()/80)%2===0) return; // 点滅
  ctx.save(); ctx.translate(x+w/2,y+h/2); ctx.scale(p.face,1); ctx.translate(-w/2,-h/2);
  const legSwing = p.onGround ? Math.sin(p.walkT)*5 : 4;
  // 足
  ctx.fillStyle='#3a2a1a';
  ctx.fillRect(w*0.18, h-8+legSwing, 9,8); ctx.fillRect(w*0.55, h-8-legSwing, 9,8);
  // 体（つなぎ・青）
  ctx.fillStyle='#4D96FF'; roundRect(w*0.12,h*0.45,w*0.76,h*0.42,6); ctx.fill();
  // シャツ（赤）
  ctx.fillStyle='#FF6B6B'; roundRect(w*0.1,h*0.34,w*0.8,h*0.2,6); ctx.fill();
  // ボタン
  ctx.fillStyle='#FFD93D'; ctx.beginPath(); ctx.arc(w*0.38,h*0.62,2.6,0,7); ctx.arc(w*0.62,h*0.62,2.6,0,7); ctx.fill();
  // 顔
  ctx.fillStyle='#f2d2a8'; roundRect(w*0.16,h*0.08,w*0.68,h*0.3,8); ctx.fill();
  // 帽子（赤）
  ctx.fillStyle='#FF6B6B'; roundRect(w*0.08,h*0.0,w*0.84,h*0.16,6); ctx.fill();
  ctx.fillRect(w*0.5,h*0.12,w*0.45,h*0.06);
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(w*0.34,h*0.08,4,0,7); ctx.fill();
  ctx.fillStyle='#FF6B6B'; ctx.font='bold 6px sans-serif'; ctx.textAlign='center'; ctx.fillText('M',w*0.34,h*0.1);
  // 目
  ctx.fillStyle='#2b3a67'; ctx.beginPath(); ctx.arc(w*0.6,h*0.24,2.6,0,7); ctx.fill();
  // ひげ
  ctx.fillStyle='#3a2a1a'; ctx.fillRect(w*0.45,h*0.3,w*0.32,3);
  ctx.restore();
}

let last=0;
function frame(ts){
  requestAnimationFrame(frame);
  const dt=last?Math.min((ts-last)/1000,0.04):0; last=ts;
  ctx.save();
  if(shakeT>0){ shakeT-=dt; const m=shakeMag; ctx.translate(rand(-m,m),rand(-m,m)); }
  if(state==='play') update(dt);
  updParticles(dt);
  drawBG();
  for(const pl of plats) drawPlat(pl);
  for(const c of coins) drawCoin(c);
  for(const f of foes) drawFoe(f);
  drawBoss();
  for(const fb of fireballs) drawFireball(fb);
  // ゴール旗（クッパを倒すまでは旗が下りている＝グレー）
  const gx=goalX-camx;
  if(gx<W+40){ ctx.fillStyle='#cfd8e6'; ctx.fillRect(gx,GROUND_Y()-170,6,170);
    ctx.globalAlpha=bossDefeated?1:0.4;
    ctx.fillStyle='#6BCB77'; ctx.beginPath(); ctx.moveTo(gx+6,GROUND_Y()-170);
    ctx.lineTo(gx+50,GROUND_Y()-150); ctx.lineTo(gx+6,GROUND_Y()-130); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='18px sans-serif'; ctx.textAlign='center'; ctx.fillText('🚩',gx+26,GROUND_Y()-146);
    ctx.globalAlpha=1; }
  if(state==='play'||state==='win'||state==='over') drawPlayer();
  drawParticles(camx);
  ctx.restore();
  // HUD
  if(state!=='ready'){ hud.textContent='❤️'.repeat(Math.max(0,lives))+'   🪙 '+coinCnt; }
}
requestAnimationFrame(frame);
</script>
