<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>ゲームセンター 〜すきなゲームをえらんでね〜</title>
<style>
  :root{
    --pop-red:#FF6B6B; --pop-yellow:#FFD93D; --pop-green:#6BCB77; --pop-blue:#4D96FF;
    --ink:#2b3a67; --paper:#F2F7FF;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; min-height:100%; }
  body{
    font-family:-apple-system,"Hiragino Maru Gothic ProN",sans-serif;
    font-weight:800; color:#fff;
    background:
      radial-gradient(1200px 600px at 50% -10%, #3a4f9e 0%, transparent 60%),
      linear-gradient(180deg, #1a2350 0%, #131a3c 100%);
    background-attachment:fixed;
    overflow-x:hidden;
  }
  /* アーケードのネオングリッド床 */
  body::before{
    content:""; position:fixed; left:0; right:0; bottom:0; height:42vh; z-index:0; pointer-events:none;
    background:
      linear-gradient(transparent, rgba(77,150,255,.12)),
      repeating-linear-gradient(90deg, rgba(77,150,255,.25) 0 2px, transparent 2px 42px),
      repeating-linear-gradient(0deg, rgba(77,150,255,.25) 0 2px, transparent 2px 42px);
    transform:perspective(420px) rotateX(58deg); transform-origin:bottom; opacity:.5;
  }
  .wrap{ position:relative; z-index:1; max-width:720px; margin:0 auto; padding:24px 16px 48px; }

  header{ text-align:center; margin:14px 0 26px; }
  .logo{
    display:inline-block; font-size:34px; font-weight:900; letter-spacing:1px;
    color:var(--pop-yellow);
    text-shadow:0 0 18px rgba(255,217,61,.7), 0 3px 0 #b9860b, 0 6px 0 rgba(0,0,0,.25);
    animation:flick 3.2s infinite;
  }
  @keyframes flick{ 0%,97%,100%{opacity:1} 98%{opacity:.55} 99%{opacity:1} }
  .sub{ margin-top:10px; font-size:15px; color:#cfe0ff; }
  .coin{
    display:inline-block; margin-top:14px; padding:6px 16px; border-radius:999px;
    background:rgba(255,217,61,.16); color:var(--pop-yellow); font-size:13px;
    border:2px solid rgba(255,217,61,.45);
    animation:blink 1.1s steps(2) infinite;
  }
  @keyframes blink{ 50%{opacity:.35} }

  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; }

  a.card{
    position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-decoration:none; color:var(--ink);
    padding:18px 12px 16px; border-radius:20px; min-height:140px;
    background:linear-gradient(180deg,#ffffff,#eef4ff);
    box-shadow:0 7px 0 var(--shadow,#9bb6e6), 0 12px 22px rgba(0,0,0,.32);
    border:3px solid #fff;
    transition:transform .08s ease, box-shadow .08s ease;
    overflow:hidden;
  }
  a.card::after{ /* 上部のツヤ */
    content:""; position:absolute; top:0; left:0; right:0; height:38%;
    background:linear-gradient(rgba(255,255,255,.55), transparent);
    pointer-events:none;
  }
  a.card:active{ transform:translateY(5px); box-shadow:0 2px 0 var(--shadow,#9bb6e6), 0 6px 12px rgba(0,0,0,.3); }
  .icon{ font-size:46px; line-height:1; filter:drop-shadow(0 3px 4px rgba(0,0,0,.18)); }
  .name{ margin-top:12px; font-size:14px; font-weight:900; text-align:center; line-height:1.3; }
  .badge{
    position:absolute; top:9px; left:9px; font-size:10px; font-weight:900;
    padding:3px 8px; border-radius:999px; color:#fff; background:var(--tag,#4D96FF);
    box-shadow:0 2px 0 rgba(0,0,0,.18);
  }

  footer{ text-align:center; margin-top:34px; color:#9fb3e6; font-size:12px; line-height:1.7; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">🕹️ ゲームセンター</div>
      <div class="sub">すきなゲームをタップしてあそぼう！</div>
      <div class="coin">★ ぜんぶ むりょう・なんかいでも あそべるよ ★</div>
    </header>

    <div class="grid" id="grid"></div>

    <footer>
      ぜんぶ あなたの スマホ・タブレットで うごきます<br>
      きょう つくった ゲームランド 🎮
    </footer>
  </div>

<script>
  // 23本（_template と 旧版 index_v0 は除外）。icon=絵文字 / tag=ジャンル札 / col=札の色
  const GAMES = [
    {f:'neko-jump',        n:'ねこジャンプ',          i:'🐱', tag:'アクション', col:'#FF6B6B'},
    {f:'mario',            n:'ジャンプ大冒険',        i:'🍄', tag:'アクション', col:'#FF6B6B'},
    {f:'mario2',           n:'ダッシュ冒険ランド',    i:'🏃', tag:'アクション', col:'#FF6B6B'},
    {f:'kart',             n:'ぷにカート',            i:'🏎️', tag:'レース',     col:'#6BCB77'},
    {f:'shooting',         n:'うちゅうシューティング',i:'🚀', tag:'シューティング', col:'#4D96FF'},
    {f:'smash-battle',     n:'ぷにスマッシュ',        i:'💥', tag:'バトル',     col:'#FFD93D'},
    {f:'taisen-battle',    n:'たいせんバトル',        i:'🥊', tag:'バトル',     col:'#FFD93D'},
    {f:'nyanko-battle',    n:'にゃんこ城バトル',      i:'🏰', tag:'バトル',     col:'#FFD93D'},
    {f:'nyanko-daisensou', n:'にゃんこ大さくせん',        i:'⚔️', tag:'バトル',     col:'#FFD93D'},
    {f:'nyanko-wars',      n:'にゃんこウォーズ',      i:'😺', tag:'バトル',     col:'#FFD93D'},
    {f:'minecraft',        n:'立体ブロックビルダー',  i:'🧱', tag:'クラフト',   col:'#6BCB77'},
    {f:'minecraft-3d',     n:'一人称3D ぼうけん',     i:'⛏️', tag:'クラフト',   col:'#6BCB77'},
    {f:'minecraft2',       n:'2D ほって つくろう',    i:'⬛', tag:'クラフト',   col:'#6BCB77'},
    {f:'doubutsu-mori',    n:'なかよし どうぶつ村', i:'🌳', tag:'のんびり',   col:'#6BCB77'},
    {f:'party',            n:'パーティすごろく',      i:'🎲', tag:'パーティ',   col:'#FF6B6B'},
    {f:'suika',            n:'おとして フルーツパズル',          i:'🍉', tag:'パズル',     col:'#4D96FF'},
    {f:'puzzle-tsunage',   n:'つなげけしパズル',      i:'🧩', tag:'パズル',     col:'#4D96FF'},
    {f:'dasshutsu',        n:'へやから だっしゅつ！', i:'🚪', tag:'なぞとき',   col:'#4D96FF'},
    {f:'catch-zukan',      n:'キャッチずかん',        i:'🐛', tag:'あつめる',   col:'#6BCB77'},
    {f:'nuri-time',        n:'ぬりぬりタイム',        i:'🎨', tag:'おえかき',   col:'#FF6B6B'},
    {f:'robot-program',    n:'ロボットプログラミング',i:'🤖', tag:'まなび',     col:'#4D96FF'},
    {f:'jiyukenkyu-gacha', n:'自由研究テーマ・ガチャ',i:'🎰', tag:'まなび',     col:'#4D96FF'},
    {f:'mirai-card',       n:'未来のぼく・わたしカード',i:'🔮', tag:'うらない', col:'#FF6B6B'},
  ];
  const shadeMap = {'#FF6B6B':'#c94f4f','#FFD93D':'#cbab1f','#6BCB77':'#4f9d59','#4D96FF':'#356fc4'};
  const grid = document.getElementById('grid');
  GAMES.forEach(g=>{
    const a = document.createElement('a');
    a.className='card';
    a.href='./'+g.f+'/index.html';
    a.style.setProperty('--tag', g.col);
    a.style.setProperty('--shadow', shadeMap[g.col]||'#9bb6e6');
    a.innerHTML =
      '<span class="badge">'+g.tag+'</span>'+
      '<span class="icon">'+g.i+'</span>'+
      '<span class="name">'+g.n+'</span>';
    grid.appendChild(a);
  });
</script>
</body>
</html>
